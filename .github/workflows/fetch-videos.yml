name: Update YouTube Videos Feed

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch YouTube XML and Parse to JSON
        run: |
          node -e "
          const fs = require('fs');
          const https = require('https');

          const channelId = 'UC0snrsML_aXCSx9I7Gaa-mA';
          const url = 'https://www.youtube.com/feeds/videos.xml?channel_id=' + channelId;

          https.get(url, (res) => {
            let data = '';

            res.on('data', chunk => {
              data += chunk;
            });

            res.on('end', () => {
              const entries = data.split('<entry>');
              const videos = [];

              for (let i = 1; i < entries.length; i++) {
                const entry = entries[i];

                const idMatch = entry.match(/<yt:videoId>([^<]+)<\/yt:videoId>/);
                if (!idMatch) continue;

                const videoId = idMatch[1];

                const titleMatch = entry.match(/<title>([^<]+)<\/title>/);
                const title = titleMatch ? titleMatch[1] : '';

                const linkMatch = entry.match(/<link[^>]+href=\"([^\"]+)\"/);
                const link = linkMatch ? linkMatch[1] : '';

                const descMatch =
                  entry.match(/<media:description>([^<]+)<\/media:description>/) ||
                  entry.match(/<description>([^<]+)<\/description>/);

                const desc = descMatch ? descMatch[1] : '';

                const titleLower = title.toLowerCase();
                const descLower = desc.toLowerCase();

                const isShort =
                  link.includes('/shorts/') ||
                  titleLower.includes('#shorts') ||
                  titleLower.includes('#short') ||
                  descLower.includes('#shorts') ||
                  descLower.includes('#short') ||
                  titleLower.startsWith('shorts/');

                if (!isShort) {
                  videos.push({
                    id: videoId,
                    title: title
                  });

                  if (videos.length >= 2) break;
                }
              }

              if (videos.length === 0) {
                videos.push(
                  {
                    id: 'lK19ZXGPN-o',
                    title: 'Unlocking *NEW FREE* Legendary as F2P Early || REALRJPLAYS || CoDM'
                  },
                  {
                    id: 'JLEqELqfOwU',
                    title: 'Why You’re Still a Noob (and how to fix it)'
                  }
                );
              }

              fs.writeFileSync(
                'videos.json',
                JSON.stringify(videos, null, 2)
              );

              console.log('videos.json updated');
            });
          }).on('error', (err) => {
            console.error(err);
            process.exit(1);
          });
          "

      - name: Commit and Push Updated Feed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add videos.json

          if git diff --cached --quiet; then
            echo "No new videos found."
          else
            git commit -m "chore: update youtube feed [skip ci]"
            git push origin HEAD
          fi
