name: Update YouTube Videos Feed

on:
schedule:
# Runs every 4 hours to keep the portfolio freshly synced
- cron: '0 */4 * * *'
workflow_dispatch: # Allows you to manually trigger it from the "Actions" tab inside GitHub

permissions:
contents: write

jobs:
fetch-feed:
runs-on: ubuntu-latest
steps:
- name: Checkout Repository
uses: actions/checkout@v4

  # STREAMING_CHUNK: Running robust Node.js parser to fetch and write videos.json...
  - name: Fetch YouTube XML and Parse to JSON
    run: |
      node -e "
      const fs = require('fs');
      const https = require('https');

      const channelId = 'UC0snrsML_aXCSx9I7Gaa-mA';
      const url = 'https://www.youtube.com/feeds/videos.xml?channel_id=' + channelId;

      console.log('Fetching live YouTube RSS feed...');
      https.get(url, (res) => {
        let data = '';
        res.on('data', (chunk) => { data += chunk; });
        res.on('end', () => {
          const entries = data.split('<entry>');
          const videos = [];
          
          for (let i = 1; i < entries.length; i++) {
            const entry = entries[i];
            
            const idMatch = entry.match(/<yt:videoId>([^<]+)<\/yt:videoId>/);
            if (!idMatch) continue;
            const videoId = idMatch[1];
            
            const titleMatch = entry.match(/<title>([^<]+)<\/title>/);
            const title = titleMatch ? titleMatch[1] : '';
            
            const linkMatch = entry.match(/<link[^>]+href=\"([^\"]+)\"/);
            const link = linkMatch ? linkMatch[1] : '';
            
            const descMatch = entry.match(/<media:description>([^<]+)<\/media:description>/) || entry.match(/<description>([^<]+)<\/description>/);
            const desc = descMatch ? descMatch[1] : '';
            
            const titleLower = title.toLowerCase();
            const descLower = desc.toLowerCase();
            
            // Exclude Shorts reliably via titles, hashtags, link formats or descriptions
            const isShort = link.includes('/shorts/') || 
                            titleLower.includes('#shorts') || 
                            titleLower.includes('#short') || 
                            descLower.includes('#shorts') || 
                            descLower.includes('#short') ||
                            titleLower.startsWith('shorts/');
                            
            if (!isShort) {
              videos.push({ id: videoId, title: title });
              if (videos.length >= 2) break;
            }
          }
          
          if (videos.length === 0) {
            console.log('No traditional videos parsed. Using fallback lists.');
            videos.push(
              { id: 'lK19ZXGPN-o', title: 'Unlocking *NEW FREE* Legendary as F2P Early || REALRJPLAYS || CoDM' },
              { id: 'JLEqELqfOwU', title: 'Why You’re Still a Noob (and how to fix it)' }
            );
          }

          fs.writeFileSync('videos.json', JSON.stringify(videos, null, 2));
          console.log('Successfully updated videos.json with:', videos);
        });
      }).on('error', (err) => {
        console.error('Failed to communicate with YouTube RSS:', err);
        process.exit(1);
      });
      "

  # STREAMING_CHUNK: Committing the fresh videos.json file back to GitHub Pages...
  - name: Commit and Push Updated Feed
    run: |
      git config --global user.name "github-actions[bot]"
      git config --global user.email "github-actions[bot]@users.noreply.github.com"
      
      git add videos.json
      if git diff --staged --quiet; then
        echo "No new updates in RJ's YouTube feed since last run."
      else
        git commit -m "chore: dynamically update youtube videos feed [skip ci]"
        git push
      fi
