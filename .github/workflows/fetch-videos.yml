name: Update YouTube Videos Feed

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch Latest 2 Long Videos
        run: |
          node <<'EOF'
          const fs = require('fs');

          const CHANNEL_ID = 'UC0snrsML_aXCSx9I7Gaa-mA';

          async function getDuration(videoId) {
            try {
              const html = await fetch(
                `https://www.youtube.com/watch?v=${videoId}`,
                {
                  headers: {
                    'User-Agent':
                      'Mozilla/5.0 (Windows NT 10.0; Win64; x64)'
                  }
                }
              ).then(r => r.text());

              const match = html.match(
                /"lengthSeconds":"(\d+)"/
              );

              return match ? Number(match[1]) : null;
            } catch {
              return null;
            }
          }

          async function main() {
            const rssUrl =
              `https://www.youtube.com/feeds/videos.xml?channel_id=${CHANNEL_ID}&t=${Date.now()}`;

            console.log('Fetching RSS...');

            const xml = await fetch(rssUrl, {
              cache: 'no-store'
            }).then(r => r.text());

            const entries = xml.split('<entry>').slice(1);

            const uploads = [];

            for (const entry of entries) {
              const idMatch = entry.match(
                /<yt:videoId>([^<]+)<\/yt:videoId>/
              );

              const titleMatch = entry.match(
                /<title>([^<]+)<\/title>/
              );

              if (!idMatch) continue;

              uploads.push({
                id: idMatch[1],
                title: titleMatch ? titleMatch[1] : ''
              });
            }

            console.log(
              `Found ${uploads.length} uploads`
            );

            const videos = [];

            for (const upload of uploads.slice(0, 15)) {
              console.log(
                `Checking ${upload.title}`
              );

              const duration =
                await getDuration(upload.id);

              console.log(
                `Duration: ${duration}s`
              );

              if (
                duration &&
                duration > 90
              ) {
                videos.push({
                  id: upload.id,
                  title: upload.title
                });

                console.log(
                  `Added: ${upload.title}`
                );

                if (videos.length >= 2)
                  break;
              }
            }

            if (videos.length === 0) {
              throw new Error(
                'No long-form videos found.'
              );
            }

            fs.writeFileSync(
              'videos.json',
              JSON.stringify(
                videos,
                null,
                2
              )
            );

            console.log(
              'Saved videos.json:',
              videos
            );
          }

          main().catch(err => {
            console.error(err);
            process.exit(1);
          });
          EOF

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet videos.json; then
            echo "No changes."
          else
            git add videos.json
            git commit -m "Update latest videos"
            git push
          fi
