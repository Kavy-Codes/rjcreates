name: Update YouTube Videos Feed

on:
  schedule:
    # Runs every 4 hours
    - cron: '0 */4 * * *'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch YouTube XML and Parse to JSON
        run: |
          node -e "
          const fs = require('fs');
          const https = require('https');

          const channelId = 'UC0snrsML_aXCSx9I7Gaa-mA';
          const url = 'https://www.youtube.com/feeds/videos.xml?channel_id=' + channelId;

          console.log('Fetching live YouTube RSS feed...');

          https.get(url, (res) => {
            let data = '';

            res.on('data', (chunk) => {
              data += chunk;
            });

            res.on('end', () => {
              const matches = [...data.matchAll(/<yt:videoId>([^<]+)<\/yt:videoId>/g)];

              const videoIds = matches
                .slice(0, 2)
                .map(match => match[1]);

              if (videoIds.length === 0) {
                console.error('Error: No video IDs found in feed output.');
                process.exit(1);
              }

              fs.writeFileSync(
                'videos.json',
                JSON.stringify(videoIds, null, 2)
              );

              console.log(
                'Successfully updated videos.json with:',
                videoIds
              );
            });
          }).on('error', (err) => {
            console.error(
              'Failed to communicate with YouTube RSS:',
              err
            );
            process.exit(1);
          });
          "

      - name: Commit and Push Updated Feed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add videos.json

          if git diff --staged --quiet; then
            echo "No new updates in YouTube feed since last run."
          else
            git commit -m "chore: dynamically update youtube videos feed [skip ci]"
            git push
          fi
