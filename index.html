<html lang="en">
<head>

    <!-- FontAwesome Pro Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            /* Premium Minimalist Light Mode (Crisp, Creamy, High-End) */
            --bg-solid: #FAF9F6;
            --text-main: #111111;
            --text-muted: #666666;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(17, 17, 17, 0.22); /* Enhanced crisp black border */
            --shadow: 0 10px 24px rgba(17, 17, 17, 0.16), 0 3px 8px rgba(17, 17, 17, 0.12); /* Stronger, pronounced black drop shadow */
            --theme-base: #111111;
            --theme-glow: rgba(17, 17, 17, 0.04);
            --theme-border-glow: rgba(17, 17, 17, 0.18);
            --theme-contrast: #FFFFFF;
            --icon-color: #111111;
            --skeleton-base: rgba(0, 0, 0, 0.04);
            --skeleton-shine: rgba(0, 0, 0, 0.08);
            --control-btn-bg: rgba(255, 255, 255, 0.85);
            --orb-color: 230, 224, 215; /* Soft, warm champagne light-mode ambient glow */
        }

        body.dark-mode {
            /* Premium Obsidian Dark Mode (Sleek, Atmospheric, High Contrast) */
            --bg-solid: #0A0A0A;
            --text-main: #FFFFFF;
            --text-muted: #888888;
            --glass-bg: rgba(18, 18, 18, 0.65);
            --glass-border: rgba(255, 255, 255, 0.09);
            --shadow: 0 15px 40px rgba(0, 0, 0, 0.7);
            --theme-base: #FFFFFF;
            --theme-glow: rgba(255, 255, 255, 0.06);
            --theme-border-glow: rgba(255, 255, 255, 0.25);
            --theme-contrast: #111111;
            --icon-color: #FFFFFF;
            --skeleton-base: rgba(255, 255, 255, 0.04);
            --skeleton-shine: rgba(255, 255, 255, 0.08);
            --control-btn-bg: rgba(20, 20, 20, 0.85);
            --orb-color: 255, 255, 255; /* Crispy ice white ambient dark-mode glow */
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            -webkit-tap-highlight-color: transparent; 
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            color: var(--text-main); 
            background-color: var(--bg-solid);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
            opacity: 0.85;
            will-change: transform;
            transform: translate3d(0,0,0);
        }

        .view {
            display: none;
            width: 100%;
            max-width: 520px;
            margin: 0 auto;
            padding: 120px 20px 40px;
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1), transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .view.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        .top-controls {
            position: fixed;
            top: 24px;
            right: 24px;
            display: flex;
            gap: 12px;
            z-index: 100;
        }

        .icon-btn {
            background: var(--control-btn-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid var(--glass-border); /* Distinct border outline */
            color: var(--text-main);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s, background 0.3s;
        }

        .icon-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 10px 25px var(--theme-border-glow);
        }

        .icon-btn:active {
            transform: scale(0.94);
        }

        .avatar-container {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 24px;
        }
        
        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 3px solid var(--text-main); /* Premium bold dark outline border */
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            z-index: 2;
            position: relative;
            box-shadow: var(--shadow);
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-fallback {
            font-family: 'Playfair Display', serif;
            font-size: 3.2rem;
            font-weight: 800;
            color: var(--text-main);
        }

        .avatar-glow {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            border-radius: 50%;
            background: radial-gradient(circle, var(--theme-border-glow) 0%, transparent 70%);
            filter: blur(14px);
            animation: pulseGlow 4s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1;
            opacity: 0.8;
            transition: background 0.5s ease;
        }

        @keyframes pulseGlow {
            0% { opacity: 0.5; transform: scale(0.95); }
            100% { opacity: 0.9; transform: scale(1.05); }
        }

        .header-text {

            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;

        .links-wrapper {
            display: flex;

        .row-split {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;

        .btn { 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-decoration: none;
            border-radius: 18px;
            font-weight: 500;

            opacity: 0;
            transform: translateY(15px) scale(0.98);

            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s, border-color 0.3s, background 0.3s;
        }

        @keyframes breatheGlow {
            0% {
                box-shadow: var(--shadow), 0 0 4px var(--theme-glow);
                border-color: var(--glass-border);
            }
            100% {
                box-shadow: var(--shadow), 0 0 12px var(--theme-border-glow);
                border-color: var(--theme-base);
            }
        }

        .btn.nav-btn {
            justify-content: flex-start;
            padding: 18px 24px;
        }

        .btn::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 0px;
            background: var(--theme-base);
            border-radius: 18px 0 0 18px;
            transition: width 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 0;
        }

        .btn:hover {
            box-shadow: var(--shadow), 0 12px 30px var(--theme-border-glow);
            border-color: var(--theme-base);
            transform: translateY(-3px);
        }
        
        .btn:hover::before {

        }
        
        .btn:active {

        .btn i {

        .video-fallback-btn {

        .skeleton {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, var(--skeleton-base) 25%, var(--skeleton-shine) 50%, var(--skeleton-base) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
            border-radius: 20px;
        }

        @keyframes shimmer {
            to {
                background-position: -200% 0;
            }
        }

        .toast {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: var(--text-main);
            border: 1px solid var(--glass-border);
            padding: 14px 28px;

            font-size: 0.95rem;
            box-shadow: var(--shadow);
            z-index: 1000;
            transition: bottom 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .toast i {
            color: var(--theme-base);
        }
        .toast.show {
            bottom: 50px;
        }
    </style>
</head>

<script>
    const root = document.documentElement;
    const body = document.body;
    const toggleBtn = document.getElementById('theme-toggle');
    const themeIcon = document.getElementById('theme-icon');

    // Default Theme Handling (Standard Black & White System)
    const isDarkStorage = localStorage.getItem('theme') !== 'light'; 
    if (isDarkStorage) {
        body.classList.add('dark-mode');
        themeIcon.classList.replace('fa-moon', 'fa-sun');
    } else {
        body.classList.remove('dark-mode');
        themeIcon.classList.replace('fa-sun', 'fa-moon');
    }

    toggleBtn.addEventListener('click', () => {
        body.classList.toggle('dark-mode');
        const isDark = body.classList.contains('dark-mode');
        themeIcon.classList.replace(isDark ? 'fa-moon' : 'fa-sun', isDark ? 'fa-sun' : 'fa-moon');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });

    // --- ANIMATED BACKGROUND ---
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let width = canvas.width = window.innerWidth;
    let height = canvas.height = window.innerHeight;

    window.addEventListener('resize', () => {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
    });

    class AmbientOrb {
        constructor() {
            this.x = Math.random() * width;
            this.y = Math.random() * height;
            this.vx = (Math.random() - 0.5) * 0.8;
            this.vy = (Math.random() - 0.5) * 0.8;
            this.size = Math.min(width, height) * (0.35 + Math.random() * 0.15);
        }

        update() {
            this.x += this.vx;
            this.y += this.vy;

            if (this.x < -this.size || this.x > width + this.size) this.vx *= -1;
            if (this.y < -this.size || this.y > height + this.size) this.vy *= -1;
        }

        draw() {
            const orbColor = getComputedStyle(root).getPropertyValue('--orb-color').trim();
            
            ctx.beginPath();
            const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
            gradient.addColorStop(0, `rgba(${orbColor}, 0.12)`);
            gradient.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = gradient;
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    const orbs = [new AmbientOrb(), new AmbientOrb(), new AmbientOrb()];

    function animateBg() {
        ctx.clearRect(0, 0, width, height);
        orbs.forEach(orb => {
            orb.update();
            orb.draw();
        });
        requestAnimationFrame(animateBg);
    }
    animateBg();

    function triggerCascade(viewId) {
        const items = document.querySelectorAll(`#${viewId} .stagger-item`);
        items.forEach((item, index) => {
            item.classList.remove('cascade-in');
            void item.offsetWidth; 
            item.style.animationDelay = `${index * 0.08}s`;
            item.classList.add('cascade-in');
        });
    }

    function switchView(viewId) {
        document.querySelectorAll('.view').forEach(view => {
            view.classList.remove('active');
            view.style.display = 'none'; 
        });
        const targetView = document.getElementById(viewId);
        targetView.style.display = 'block';
        setTimeout(() => targetView.classList.add('active'), 10);
        triggerCascade(viewId);
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function shareProfile() {
        const url = window.location.href;
        const dummy = document.createElement('input');
        document.body.appendChild(dummy);
        dummy.value = url;
        dummy.select();
        document.execCommand('copy');
        document.body.removeChild(dummy);

        const toast = document.getElementById('toast');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // --- STREAMING_CHUNK: YT API & RESILIENT PLAYER CONTROLLER ---
    const CHANNEL_ID = 'UC0snrsML_aXCSx9I7Gaa-mA';
    const fallbackVideos = [
        { id: 'lK19ZXGPN-o', title: 'Unlocking *NEW FREE* Legendary as F2P Early || REALRJPLAYS || CoDM' },
        { id: 'JLEqELqfOwU', title: 'Why You’re Still a Noob (and how to fix it)' }
    ]; 
    
    // Dynamic metadata cache store to accurately hold titles and thumbnails
    const videoMetadataCache = {};
    let ytApiReady = false;
    let pendingVideosToLoad = null;

    // Seeding our cache with reliable defaults immediately
    fallbackVideos.forEach(v => {
        videoMetadataCache[v.id] = {
            title: v.title,
            thumbnail: `https://i.ytimg.com/vi/${v.id}/hqdefault.jpg`
        };
    });

    // This runs automatically when the YouTube script API script finishes loading
    window.onYouTubeIframeAPIReady = () => {
        ytApiReady = true;
        if (pendingVideosToLoad) {
            renderPlayers(pendingVideosToLoad);
        }
    };

    function loadVideoContainer(videoIds) {
        if (ytApiReady) {
            renderPlayers(videoIds);
        } else {
            pendingVideosToLoad = videoIds;
        }
    }

    function renderPlayers(videoIds) {
        const container = document.getElementById('video-container');
        container.innerHTML = ''; 

        videoIds.forEach((videoId, index) => {
            const card = document.createElement('div');
            card.className = 'video-card';
            card.style.animationDelay = `${index * 0.15}s`;

            // Inner player container
            const playerWrapper = document.createElement('div');
            playerWrapper.className = 'video-player-wrapper';
            const playerTargetId = `yt-player-target-${videoId}-${index}`;
            playerWrapper.id = playerTargetId;

            card.appendChild(playerWrapper);
            container.appendChild(card);

            // Instantiate native Player
            setTimeout(() => {
                new YT.Player(playerTargetId, {
                    height: '100%',
                    width: '100%',
                    videoId: videoId,
                    playerVars: {
                        'playsinline': 1,
                        'rel': 0,
                        'modestbranding': 1
                    },
                    events: {
                        'onError': (event) => {
                            // Catch embed errors: 101/150/153 are typical restricted/unplayable codes
                            if (event.data === 101 || event.data === 150 || event.data === 2 || event.data === 5 || event.data === 100) {
                                handlePlayerError(card, videoId);
                            }
                        }
                    }
                });
                card.classList.add('cascade-in');
            }, 50);
        });
    }

    // Morph the card dynamically into a premium external redirection card if error triggers
    function handlePlayerError(cardElement, videoId) {
        const wrapper = cardElement.querySelector('.video-player-wrapper') || cardElement;
        
        // Grab title and thumbnail securely from cache
        const metadata = videoMetadataCache[videoId] || {
            title: "Playback Restricted on External Sites",
            thumbnail: `https://i.ytimg.com/vi/${videoId}/hqdefault.jpg`
        };
        
        const fallbackHtml = `
            <div class="video-fallback-card" style="background-image: url('${metadata.thumbnail}')">
                <div class="video-fallback-overlay"></div>
                <div class="video-fallback-content">
                    <i class="fa-solid fa-circle-exclamation"></i>
                    <span class="video-fallback-title">${metadata.title}</span>
                    <a href="https://www.youtube.com/watch?v=${videoId}" target="_blank" class="video-fallback-btn">
                        <i class="fa-brands fa-youtube"></i> Watch on YouTube
                    </a>
                </div>
            </div>
        `;
        wrapper.innerHTML = fallbackHtml;
    }

    // XML parsing utility to fetch feed videos while filtering out YouTube Shorts
    function parseFeedAndFilterShorts(xmlText) {
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(xmlText, "text/xml");
        const entries = xmlDoc.getElementsByTagName("entry");
        const filteredVideos = [];

        for (let i = 0; i < entries.length; i++) {
            if (filteredVideos.length >= 2) break; // We only need the 2 most recent traditional videos

            const titleNode = entries[i].getElementsByTagName("title")[0];
            const descNode = entries[i].getElementsByTagName("media:description")[0] || entries[i].getElementsByTagName("description")[0];
            const videoIdNode = entries[i].getElementsByTagName("yt:videoId")[0];
            const linkNode = entries[i].getElementsByTagName("link")[0];

            if (videoIdNode && videoIdNode.textContent) {
                const videoId = videoIdNode.textContent;
                const titleText = titleNode ? titleNode.textContent : "";
                const descText = descNode ? descNode.textContent.toLowerCase() : "";
                const linkHref = linkNode ? linkNode.getAttribute("href") : "";

                // Heuristic detection: YouTube Shorts almost always contain #shorts, #short, or /shorts/ links
                const isShort = titleText.toLowerCase().includes('#shorts') || 
                                titleText.toLowerCase().includes('#short') || 
                                descText.includes('#shorts') || 
                                descText.includes('#short') || 
                                titleText.toLowerCase().startsWith('shorts/') ||
                                titleText.toLowerCase().includes('youtube shorts') ||
                                (linkHref && linkHref.includes('/shorts/'));

                if (!isShort) {
                    filteredVideos.push({ id: videoId, title: titleText });
                }
            }
        }
        return filteredVideos;
    }

    // Trigger sequential loaders: Feed.json (schedule-updated via GitHub Action) -> Proxy CORS Feed -> Fallbacks
    fetch('./videos.json')
        .then(res => {
            if (!res.ok) throw new Error('Local video file not found');
            return res.json();
        })
        .then(videos => {
            if (videos && videos.length > 0) {
                const parsedIds = [];
                videos.forEach(v => {
                    const id = typeof v === 'object' ? v.id : v;
                    const title = typeof v === 'object' ? v.title : 'Latest Video';
                    parsedIds.push(id);
                    videoMetadataCache[id] = {
                        title: title,
                        thumbnail: `https://i.ytimg.com/vi/${id}/hqdefault.jpg`
                    };
                });
                loadVideoContainer(parsedIds);
            } else {
                throw new Error('Empty JSON feed');
            }
        })
        .catch(() => {
            // Live CORS backup parsing using live proxy fetcher
            const rssUrl = `https://www.youtube.com/feeds/videos.xml?channel_id=${CHANNEL_ID}`;
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(rssUrl)}`;

            fetch(proxyUrl)
                .then(res => res.json())
                .then(data => {
                    const parsedVideos = parseFeedAndFilterShorts(data.contents);
                    if (parsedVideos.length > 0) {
                        const parsedIds = [];
                        parsedVideos.forEach(v => {
                            parsedIds.push(v.id);
                            videoMetadataCache[v.id] = {
                                title: v.title,
                                thumbnail: `https://i.ytimg.com/vi/${v.id}/hqdefault.jpg`
                            };
                        });
                        loadVideoContainer(parsedIds);
                    } else {
                        throw new Error('No traditional videos parsed');
                    }
                })
                .catch(() => {
                    // Failover defaults to known-good embed playable video IDs
                    const parsedIds = fallbackVideos.map(v => v.id);
                    loadVideoContainer(parsedIds);
                });
        });

    window.onload = () => triggerCascade('home-view');
</script>
</body>
</html>
