<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RJ CREATES | Link in Bio</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* CORE THEME VARIABLES */
        :root {
            --theme-base: #8B4513; /* Default Accent Color */
            --theme-darker: #4A250A; /* Auto-calculated by JS */
            --theme-glow: rgba(139, 69, 19, 0.4);
            
            /* Light Mode Defaults */
            --bg-solid: #FDFBF7;
            --text-main: #1A1A1A;
            --text-muted: #555555;
            --glass-bg: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(255, 255, 255, 0.8);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        /* Dark Mode Overrides */
        body.dark-mode {
            --bg-solid: #0A0A0A;
            --text-main: #FFFFFF;
            --text-muted: #A0A0A0;
            --glass-bg: rgba(20, 20, 20, 0.5);
            --glass-border: rgba(255, 255, 255, 0.08);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; transition: background-color 0.4s, color 0.4s; }

        body { 
            font-family: 'Poppins', sans-serif; 
            color: var(--text-main); 
            min-height: 100vh;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            position: relative;
            overflow-x: hidden;
            background-color: var(--bg-solid);
        }

        /* =========================================
           PREMIUM CSS MESH/AURORA BACKGROUND 
           ========================================= */
        .bg-mesh {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
            overflow: hidden;
        }
        
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            animation: float 20s infinite alternate ease-in-out;
        }

        .orb-1 {
            width: 60vmax; height: 60vmax;
            background: var(--theme-base);
            top: -20vmax; left: -20vmax;
        }

        .orb-2 {
            width: 50vmax; height: 50vmax;
            background: var(--theme-darker);
            bottom: -10vmax; right: -10vmax;
            animation-delay: -10s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(10vmax, 10vmax) scale(1.2); }
        }

        /* =========================================
           TOP CONTROLS
           ========================================= */
        .top-controls {
            position: absolute;
            top: 25px; right: 25px;
            display: flex;
            gap: 15px;
            z-index: 10;
        }

        .icon-btn {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            width: 45px; height: 45px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .icon-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 10px 25px var(--theme-glow);
        }

        .color-picker-wrapper { position: relative; }
        .color-picker-wrapper input[type="color"] {
            position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; top: 0; left: 0;
        }

        /* =========================================
           MAIN LAYOUT
           ========================================= */
        .container { 
            max-width: 500px; 
            width: 100%; 
            padding: 80px 20px 40px; 
            text-align: center; 
            z-index: 1;
        }

        h1 { 
            font-family: 'Playfair Display', serif;
            font-size: 3rem; 
            font-weight: 700;
            margin-bottom: 5px; 
            background: linear-gradient(135deg, var(--text-main), var(--theme-base));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle { 
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 40px; 
            letter-spacing: 0.5px;
        }

        /* =========================================
           GLASSMORPHIC BUTTONS
           ========================================= */
        .links-wrapper { display: flex; flex-direction: column; gap: 16px; margin-bottom: 40px; }
        .row-split { display: flex; gap: 16px; }

        .btn { 
            display: flex; align-items: center; justify-content: center; gap: 12px;
            text-decoration: none; 
            border-radius: 16px; 
            font-weight: 500;
            font-size: 1rem;
            padding: 18px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            box-shadow: var(--shadow);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
        }

        /* Subtle left border accent using the chosen theme color */
        .btn::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0; width: 4px;
            background: var(--theme-base);
            transition: width 0.3s;
        }

        .btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 35px var(--theme-glow);
            border-color: var(--theme-base);
        }

        .btn:hover::before { width: 8px; }

        .btn i { font-size: 1.3rem; color: var(--theme-base); }
        .row-split .btn { flex: 1; padding: 18px 10px; font-size: 0.9rem; }

        /* =========================================
           VIDEO SECTION
           ========================================= */
        h3.section-title { 
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            margin-bottom: 20px;
        }

        .video-container { display: flex; flex-direction: column; gap: 20px; }
    </style>
</head>
<body>

<div class="bg-mesh">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
</div>

<div class="top-controls">
    <div class="color-picker-wrapper icon-btn" title="Pick Theme Color">
        <i class="fa-solid fa-palette"></i>
        <input type="color" id="theme-color" value="#8B4513">
    </div>
    <button id="theme-toggle" class="icon-btn" title="Toggle Dark/Light Mode">
        <i class="fa-solid fa-moon" id="theme-icon"></i>
    </button>
</div>

<div class="container">
    <h1>RJ CREATES</h1>
    <p class="subtitle">Content Creator | Mobile Gamer | Editor</p>

    <div class="links-wrapper">
        <div class="row-split">
            <a href="https://youtube.com/@realrjplays" class="btn" target="_blank">
                <i class="fa-brands fa-youtube"></i> RJ PLAYS
            </a>
            <a href="https://youtube.com/@RJEDITZZZ" class="btn" target="_blank">
                <i class="fa-brands fa-youtube"></i> RJ EDITZZZ
            </a>
        </div>
        <a href="https://www.instagram.com/realrjplaysyt?igsh=MThzdHppZ3RibXB3aA==" class="btn" target="_blank">
            <i class="fa-brands fa-instagram"></i> RJ PLAYS (Instagram)
        </a>
        <a href="https://discord.gg/jSSKFNknZS" class="btn" target="_blank">
            <i class="fa-brands fa-discord"></i> RJ's HQ (Discord)
        </a>
        <a href="Creation.html" class="btn">
            <i class="fa-solid fa-layer-group"></i> Other Creations
        </a>
    </div>

    <h3 class="section-title">Latest Videos</h3>
    <div id="video-container" class="video-container">
        <p style="color: var(--text-muted);"><i class="fa-solid fa-spinner fa-spin"></i> Fetching latest videos...</p>
    </div>
</div>

<script>
    // 1. HELPER: Calculate Darker Shade
    function shadeColor(color, percent) {
        let R = parseInt(color.substring(1,3),16);
        let G = parseInt(color.substring(3,5),16);
        let B = parseInt(color.substring(5,7),16);
        R = parseInt(R * (100 + percent) / 100);
        G = parseInt(G * (100 + percent) / 100);
        B = parseInt(B * (100 + percent) / 100);
        R = (R<255)?R:255; G = (G<255)?G:255; B = (B<255)?B:255;
        let RR = ((R.toString(16).length==1)?"0"+R.toString(16):R.toString(16));
        let GG = ((G.toString(16).length==1)?"0"+G.toString(16):G.toString(16));
        let BB = ((B.toString(16).length==1)?"0"+B.toString(16):B.toString(16));
        return "#"+RR+GG+BB;
    }

    // 2. THEME INITIALIZATION
    const root = document.documentElement;
    const body = document.body;
    const toggleBtn = document.getElementById('theme-toggle');
    const themeIcon = document.getElementById('theme-icon');
    const colorPicker = document.getElementById('theme-color');

    // Load Dark Mode
    if(localStorage.getItem('theme') === 'dark') {
        body.classList.add('dark-mode');
        if(themeIcon) themeIcon.classList.replace('fa-moon', 'fa-sun');
    }

    // Load Custom Color
    const savedColor = localStorage.getItem('themeColor');
    if (savedColor) {
        if(colorPicker) colorPicker.value = savedColor;
        root.style.setProperty('--theme-base', savedColor);
        root.style.setProperty('--theme-darker', shadeColor(savedColor, -40));
        root.style.setProperty('--theme-glow', hexToRgba(savedColor, 0.4));
    }

    // Convert Hex to RGBA for shadows
    function hexToRgba(hex, alpha) {
        let r = parseInt(hex.slice(1, 3), 16),
            g = parseInt(hex.slice(3, 5), 16),
            b = parseInt(hex.slice(5, 7), 16);
        return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    // 3. EVENT LISTENERS
    if(toggleBtn) {
        toggleBtn.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            const isDark = body.classList.contains('dark-mode');
            themeIcon.classList.replace(isDark ? 'fa-moon' : 'fa-sun', isDark ? 'fa-sun' : 'fa-moon');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });
    }

    if(colorPicker) {
        colorPicker.addEventListener('input', (e) => {
            const color = e.target.value;
            root.style.setProperty('--theme-base', color);
            root.style.setProperty('--theme-darker', shadeColor(color, -40));
            root.style.setProperty('--theme-glow', hexToRgba(color, 0.4));
            localStorage.setItem('themeColor', color);
        });
    }

    // 4. YOUTUBE API FETCHER
    const CHANNEL_ID = 'UC0snrsML_aXCSx9I7Gaa-mA'; 
    const RSS_URL = `https://www.youtube.com/feeds/videos.xml?channel_id=${CHANNEL_ID}`;
    const API_URL = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(RSS_URL)}`;

    fetch(API_URL)
        .then(res => res.json())
        .then(data => {
            const container = document.getElementById('video-container');
            container.innerHTML = ''; 
            if (data.items && data.items.length > 0) {
                const latestVideos = data.items.slice(0, 2);
                latestVideos.forEach(video => {
                    const videoId = video.link.split('v=')[1];
                    const videoHtml = `
                        <div style="position: relative; padding-bottom: 56.25%; height: 0; border-radius: 16px; overflow: hidden; box-shadow: var(--shadow); border: 1px solid var(--glass-border); background: #000;">
                            <iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;"></iframe>
                        </div>`;
                    container.innerHTML += videoHtml;
                });
            } else { container.innerHTML = '<p>No videos found.</p>'; }
        })
        .catch(err => {
            console.error(err);
            document.getElementById('video-container').innerHTML = '<p>Could not load videos.</p>';
        });
</script>
</body>
</html>
